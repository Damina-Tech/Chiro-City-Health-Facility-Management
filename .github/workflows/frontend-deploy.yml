# FTP 421 "Home directory not available": fix in cPanel → FTP Accounts (home path must exist on disk).
# Optional: set secret FTP_REMOTE_DIR_FRONTEND (e.g. public_html/) to override upload folder.
name: Deploy React.js App to cPanel via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.18.0

    - name: Install dependencies
      run: npm install

    - name: Build React.js app
      run: npm run build

    - name: Deploy to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_FRONTEND_USERNAME }}
        password: ${{ secrets.FTP_FRONTEND_PASSWORD }}
        local-dir: ./frontend/dist/
        protocol: ftps
        security: loose
